spring:
  application:
    name: events

  # Configuración de la base de datos H2 en memoria
  datasource:
    url: jdbc:h2:mem:eventsdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  # Hibernate crea las tablas automáticamente
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true


  h2:
    console:
      enabled: true


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_yzwNALI2A